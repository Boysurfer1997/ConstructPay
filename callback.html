<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConstructPay — Connecting to QuickBooks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1e293b; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 48px; max-width: 480px; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; color: #16a34a; }
    p { color: #475569; line-height: 1.6; margin-bottom: 16px; }
    .code-box { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.9rem; word-break: break-all; margin: 16px 0; }
    button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .copied { color: #16a34a; font-weight: 600; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <h1>Connecting...</h1>
      <p>Processing your QuickBooks authorization.</p>
    </div>
    <div id="success" style="display:none;">
      <h1>&#10003; QuickBooks Authorized!</h1>
      <p>Copy this code and paste it into ConstructPay:</p>
      <div class="code-box" id="auth-code"></div>
      <button onclick="copyCode()">Copy Code</button>
      <p id="copy-status" style="margin-top: 12px;"></p>
    </div>
    <div id="error-msg" style="display:none;">
      <h1 class="error">Connection Failed</h1>
      <p id="error-text"></p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const realmId = params.get('realmId');
    const state = params.get('state');
    const error = params.get('error');

    if (error) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-text').textContent = 'QuickBooks returned an error: ' + error;
    } else if (code) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      const fullCode = code + '|' + (realmId || '') + '|' + (state || '');
      document.getElementById('auth-code').textContent = fullCode;
    } else {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-text').textContent = 'No authorization code received. Please try again from ConstructPay.';
    }

    function copyCode() {
      const text = document.getElementById('auth-code').textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copy-status').innerHTML = '<span class="copied">Copied! Paste this in ConstructPay.</span>';
      });
    }
  </script>
</body>
</html>
